<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>START MAKERS | Inicia Sesión en tu Futuro</title>
    <link rel="stylesheet" href="../assets/css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    

    <div class="login-container">
        
        <div class="login-card">
            
            <div class="login-header">
                <div class="logo-icon">🚀</div>
                <h1>START <span>MAKERS</span></h1>
                <p>Inicia sesión para impulsar tu proyecto</p>
            </div>

            <form action="auth.php" method="POST" class="login-form">
                
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                   <input type="text" name="usuario" value="LEINELCITO" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" name="password" value="123456" required>
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember"> Recordarme
                    </label>
                    <a href="recuperar.php" class="forgot-password">¿Olvidaste tu contraseña?</a>
                </div>

                <a href="emprende.html" class="btn-login" style="display: block; text-align: center; text-decoration: none;" 
                onclick="validarAcceso()">
                Inicia Sesión
                </a>

                <script>
                function validarAcceso(event) {
                event.preventDefault();
                const user = document.getElementById('usuario').value;
                const pass = document.getElementById('password').value;

                let usuarios = JSON.parse(localStorage.getItem('usuarios_sm')) || [];
                
                // Usuario por defecto por si acaso
                usuarios.push({ correo: "juan@startmakers.com", clave: "123456" });

                const match = usuarios.find(u => u.correo === user && u.clave === pass);

                if (match) {
                    window.location.href = "emprende.html";
                } else {
                    alert("Acceso denegado");
                }
}
                </script>
            </form>

            <div class="login-footer">
                <p>¿Aún no tienes equipo? <a href="registro.html">Regístrate aquí</a></p>
            </div>

        </div>

        <div class="idea-protection-tag">
            <i class="fas fa-shield-alt"></i> Ideas Protegidas por START MAKERS
        </div>

    </div>
    

    <script src="../scripts/login.js"></script>
    
</body>
</html>
